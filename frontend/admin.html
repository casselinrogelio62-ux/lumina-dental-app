<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Lumina Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos extra solo para la tabla admin */
        .admin-header { background: var(--primary); color: white; padding: 20px 0; margin-bottom: 40px; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: var(--bg-light); padding: 16px; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid var(--border-light); }
        td { padding: 16px; border-bottom: 1px solid var(--border-light); color: var(--text-main); }
        tr:hover { background: #f8fafc; }
        .status-badge { background: #d1fae5; color: #065f46; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
    </style>
</head>
<body style="background: var(--bg-light);">

    <div class="admin-header">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="logo" style="color: white;">
                <i class="ph ph-tooth"></i> Lumina Admin
            </div>
            <a href="/" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.9rem;">Ver sitio web</a>
        </div>
    </div>

    <div class="container">
        <div class="glass-panel">
            <h2 style="margin-bottom: 24px;">Agenda de Pacientes</h2>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Paciente</th>
                            <th>Contacto</th>
                            <th>Servicio</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-reservas">
                        <tr>
                            <td colspan="6" style="text-align: center; padding: 40px;">
                                <i class="ph ph-spinner-gap spin" style="font-size: 2rem; color: var(--primary);"></i>
                                <p>Cargando base de datos...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
